<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Markdown Conversion</title>
  <style>
    body { font-family: Arial, sans-serif; line-height: 1.6; margin: 2rem; max-width: 900px; }
    pre { background: #f6f8fa; padding: 1rem; overflow-x: auto; }
    code { background: #f2f4f7; padding: 0.2rem 0.4rem; border-radius: 4px; }
    blockquote { color: #555; border-left: 4px solid #ddd; padding-left: 1rem; margin: 1rem 0; }
    h1, h2, h3, h4, h5, h6 { margin-top: 1.4rem; }
    ul, ol { margin: 0 0 1rem 1.5rem; }
    hr { border: none; border-top: 1px solid #ddd; margin: 1.5rem 0; }
  </style>
</head>
<body>
<p>
﻿# Hello World
</p>
<p>
This is a <strong>Markdown</strong> converter.
</p>
<ul>
  <li>Item one</li>
  <li>Item two</li>
</ul>
<p>
<a href=\""https://example.com\"">"Link"</a>
</p>
</body>
</html>
